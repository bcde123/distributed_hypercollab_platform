server {
    listen 80;
    server_name localhost;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Client / proxy settings ────────────────────────────────────────────────
    client_max_body_size    10m;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── Static React app ───────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # Support client-side routing (React Router)
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets forever (Vite adds content hashes to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API reverse proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
    }

    # ── WebSocket reverse proxy ────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend:5001/ws;
        proxy_http_version 1.1;
        # Required upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        # Keep WS connections alive longer than default proxy timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
